- name: Install packages
  apt:
    name:
      - nginx-extras
      - certbot
      - python3-certbot-nginx
      - curl
      - sing-box
    update_cache: yes

- name: Create dirs
  file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
    recurse: true
  loop:
    - /var/www/static/.well-known/acme-challenge
    - /var/www
    - /etc/nginx/sites-enabled
    - /etc/nginx/modules-enabled

- name: Copy nginx conf
  copy:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf

- name: Copy nginx mime.types
  copy:
    src: mime.types
    dest: /etc/nginx/mime.types

- name: Copy nginx modules
  copy:
    src: modules.conf
    dest: /etc/nginx/modules.conf

- name: Copy nginx default site
  copy:
    src: default.conf
    dest: /etc/nginx/sites-enabled/default

- name: Configure stream nginx
  template:
    src: nginx-stream.conf.j2
    dest: /etc/nginx/nginx-stream.conf

- name: Reload nginx
  systemd:
    name: nginx
    state: reloaded

- name: Obtain TLS certs
  shell: >
    certbot certonly --webroot
    -w /var/www/static
    -d {{ proxy_masked_vless_domain }}
    {% if proxy_masked_naive_domain is defined and proxy_masked_naive_domain | length > 0 %}
    -d {{ proxy_masked_naive_domain }}
    {% endif %}
    {% if proxy_masked_trust_domain is defined and proxy_masked_trust_domain | length > 0 %}
    -d {{ proxy_masked_trust_domain }}
    {% endif %}
    --email {{ proxy_masked_email }}
    --agree-tos
    --non-interactive
  args:
    creates: "/etc/letsencrypt/live/{{ proxy_masked_vless_domain }}/fullchain.pem"

- name: Configure vless nginx
  template:
    src: nginx-vless.conf.j2
    dest: /etc/nginx/sites-enabled/{{ proxy_masked_vless_domain }}

- name: Reload nginx
  systemd:
    name: nginx
    state: reloaded
